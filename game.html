<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Bienvenue sur le site de salixe</title>
    <!-- The style.css file allows you to change the look of your web pages.
         If you include the next line in all your web pages, they will all share the same look.
         This makes it easier to make new pages for your site. -->
    <link href="style.css" rel="stylesheet">
  </head>
  <body>
    <h1>Jeu</h1>

    <ul class="menu" id="headers">
    </ul>
    <script src="headers.js"></script>
  </body>

  <p>
    Pétit jeu pr l'plaisir!
  </p>
  <label>Points: <div id="pts">0</div></label>
  <script>
    // Variables
    let pts = 0;
    let pts_el = document.getElementById("pts");
    let canPress = true;

    // Events
    setInterval(addPts, 100, 0.1);

    window.addEventListener("keydown", function (event) {
      // Then display the event.key
      if(canPress){
        addPts(1);
        canPress = false;
      };
    });

    window.addEventListener("keyup", function (event) {
      canPress = true;
    });

    // Functions
    function addPts(n){
      pts = pts + n;
      pts_el.textContent = pts.toFixed(0);
    };
  </script>
</html>
