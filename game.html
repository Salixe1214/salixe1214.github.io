<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Bienvenue sur le site de salixe</title>
    <!-- The style.css file allows you to change the look of your web pages.
         If you include the next line in all your web pages, they will all share the same look.
         This makes it easier to make new pages for your site. -->
    <link href="style.css" rel="stylesheet">
  </head>
  <body>
    <h1>Jeu</h1>

    <ul class="menu" id="headers">
    </ul>
    <script src="headers.js"></script>
  </body>

<p id="demo"></p>
  <p>
    Pétit jeu pr l'plaisir!
    <br>
    Appuis sur une touche du clavier pour augmenter tes points.
  </p>
  <label>Points: <var id="pts">0</var><img src="yen.png"></label>
  <hr>
  <label>Tick rate: <var id="tick">0</var>/s</label>
  <br>
  <label>Click rate: <var id="click">0</var></label>
  <hr>
  <label>Dernière sauvegarde: <var id="time_save"></var></label>

  <script>
    // Variables
    let pts = localStorage.getItem("pts") != null ? Number(localStorage.getItem("pts")) : 0;
    let click_rate = localStorage.getItem("click_rate") != null ?  Number(localStorage.getItem("click_rate")) : 1;
    let tick_rate = localStorage.getItem("tick_rate") != null ?  Number(localStorage.getItem("tick_rate")) : 0.1;

    let pts_el = document.getElementById("pts");
    pts_el.textContent = pts.toFixed(0);

    let tick_el = document.getElementById("tick");
    tick_el.textContent = tick_rate;

    let click_el = document.getElementById("click");
    click_el.textContent = click_rate;

    let time_save_el = document.getElementById("time_save");
    saveData();

    let canPress = true;

    // Events
    setInterval(addPts, 100, tick_rate);
    setInterval(saveData, 10000);

    window.addEventListener("keydown", stimulusStart);
    window.addEventListener("touchstart", stimulusStart);

    window.addEventListener("keyup", stimulusEnd);
    window.addEventListener("touchend", stimulusEnd);

    // Functions
    function stimulusStart(event){
      if(canPress){
        addPts(click_rate);
        canPress = false;
      };
    };
    function stimulusEnd(event){
      canPress = true;
    };

    function addPts(n){
      pts = pts + n;

      pts_el.textContent = pts.toFixed(0);
    };

    function saveData() {
      localStorage.setItem("pts", pts);
      localStorage.setItem("click_rate", click_rate);
      localStorage.setItem("tick_rate", tick_rate);
      time_save_el.innerText = (new Date(Date.now())).toString();
    };

    // Autre
    tick_el.textContent = tick_rate;
    click_el.textContent = click_rate;
  </script>
</html>
